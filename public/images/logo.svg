<svg width="100%" viewBox="0 0 730 430" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Logo CARWASH - Centre de lavage auto</title>
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A5F8A"/>
      <stop offset="100%" stop-color="#0D3B5E"/>
    </linearGradient>
    <linearGradient id="windshieldGrad" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#4FC3F7" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1A8CC7" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="730" height="430" fill="#050F1A" rx="20"/>

  <!-- Decorative arc lines -->
  <g opacity="0.07" stroke="#00C9FF" stroke-width="1" fill="none">
    <ellipse cx="340" cy="310" rx="380" ry="60"/>
    <ellipse cx="340" cy="310" rx="330" ry="52"/>
    <ellipse cx="340" cy="310" rx="280" ry="44"/>
  </g>

  <!-- CAR BODY -->
  <g transform="translate(340,220)">
    <ellipse cx="0" cy="80" rx="175" ry="10" fill="#00C9FF" opacity="0.08"/>
    <path d="M-175,30 Q-170,-10 -120,-10 L-90,-40 Q-70,-68 -20,-72 L70,-72 Q115,-72 140,-50 L165,-20 Q175,-10 175,10 L175,35 Q175,45 165,45 L-165,45 Q-175,45 -175,35 Z" fill="url(#bodyGrad)"/>
    <path d="M-86,-38 Q-60,-80 -10,-85 L62,-85 Q105,-82 128,-52 L145,-25 L-86,-25 Z" fill="#0D3B5E"/>
    <path d="M-62,-25 L-42,-75 L55,-75 L88,-25 Z" fill="url(#windshieldGrad)" opacity="0.9"/>
    <path d="M-125,-25 L-105,-58 L-48,-58 L-48,-25 Z" fill="#1A8CC7" opacity="0.65"/>
    <path d="M-62,-25 L-42,-75 L55,-75 L88,-25 Z" fill="none" stroke="#00C9FF" stroke-width="1.2" opacity="0.6"/>
    <path d="M-125,-25 L-105,-58 L-48,-58 L-48,-25 Z" fill="none" stroke="#00C9FF" stroke-width="1.2" opacity="0.5"/>
    <path d="M-175,5 Q-130,-8 0,-8 Q100,-8 175,5" fill="none" stroke="#00C9FF" stroke-width="1.5" opacity="0.5"/>
    <!-- Grille -->
    <rect x="140" y="10" width="28" height="18" rx="3" fill="#0D3B5E" stroke="#00C9FF" stroke-width="0.8" opacity="0.9"/>
    <line x1="144" y1="14" x2="164" y2="14" stroke="#00C9FF" stroke-width="0.7" opacity="0.7"/>
    <line x1="144" y1="18" x2="164" y2="18" stroke="#00C9FF" stroke-width="0.7" opacity="0.7"/>
    <line x1="144" y1="22" x2="164" y2="22" stroke="#00C9FF" stroke-width="0.7" opacity="0.7"/>
    <!-- Headlight -->
    <ellipse cx="158" cy="0" rx="10" ry="6" fill="#4FC3F7" opacity="0.9"/>
    <ellipse cx="158" cy="0" rx="6" ry="4" fill="#E0F7FA"/>
    <!-- Tail light -->
    <rect x="-172" y="-2" width="14" height="8" rx="2" fill="#1A5F8A" stroke="#00C9FF" stroke-width="0.5" opacity="0.8"/>
    <!-- Wheel wells -->
    <path d="M-175,30 Q-175,45 -165,45 L-130,45 Q-108,45 -108,30" fill="#050F1A"/>
    <path d="M90,45 L130,45 Q150,45 150,30" fill="#050F1A"/>
    <!-- Rear wheel -->
    <circle cx="-132" cy="45" r="28" fill="#0A1F2E" stroke="#1A8CC7" stroke-width="2.5"/>
    <circle cx="-132" cy="45" r="20" fill="#050F1A"/>
    <circle cx="-132" cy="45" r="12" fill="#0D3B5E"/>
    <line x1="-132" y1="27" x2="-132" y2="63" stroke="#1A8CC7" stroke-width="1.2" opacity="0.7"/>
    <line x1="-150" y1="45" x2="-114" y2="45" stroke="#1A8CC7" stroke-width="1.2" opacity="0.7"/>
    <line x1="-145" y1="32" x2="-119" y2="58" stroke="#1A8CC7" stroke-width="1.2" opacity="0.7"/>
    <line x1="-119" y1="32" x2="-145" y2="58" stroke="#1A8CC7" stroke-width="1.2" opacity="0.7"/>
    <circle cx="-132" cy="45" r="5" fill="#00C9FF"/>
    <!-- Front wheel -->
    <circle cx="108" cy="45" r="28" fill="#0A1F2E" stroke="#1A8CC7" stroke-width="2.5"/>
    <circle cx="108" cy="45" r="20" fill="#050F1A"/>
    <circle cx="108" cy="45" r="12" fill="#0D3B5E"/>
    <line x1="108" y1="27" x2="108" y2="63" stroke="#1A8CC7" stroke-width="1.2" opacity="0.7"/>
    <line x1="90" y1="45" x2="126" y2="45" stroke="#1A8CC7" stroke-width="1.2" opacity="0.7"/>
    <line x1="95" y1="32" x2="121" y2="58" stroke="#1A8CC7" stroke-width="1.2" opacity="0.7"/>
    <line x1="121" y1="32" x2="95" y2="58" stroke="#1A8CC7" stroke-width="1.2" opacity="0.7"/>
    <circle cx="108" cy="45" r="5" fill="#00C9FF"/>
  </g>

  <!-- SPRAY GUN -->
  <g transform="translate(540,100)" opacity="0.95">
    <rect x="0" y="18" width="48" height="16" rx="6" fill="#1A5F8A"/>
    <rect x="8" y="12" width="16" height="22" rx="4" fill="#1A8CC7"/>
    <rect x="2" y="22" width="44" height="8" rx="4" fill="#0D3B5E"/>
    <circle cx="50" cy="26" r="5" fill="#00C9FF"/>
    <path d="M0,26 Q-20,36 -30,60 Q-35,80 -20,100" fill="none" stroke="#1A8CC7" stroke-width="5" stroke-linecap="round"/>
    <path d="M0,26 Q-20,36 -30,60 Q-35,80 -20,100" fill="none" stroke="#4FC3F7" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Water jets -->
  <g opacity="0.85">
    <line x1="535" y1="122" x2="490" y2="148" stroke="#00C9FF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="535" y1="116" x2="484" y2="134" stroke="#4FC3F7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="535" y1="110" x2="480" y2="122" stroke="#4FC3F7" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="535" y1="104" x2="477" y2="112" stroke="#B3E5FC" stroke-width="1.0" stroke-linecap="round"/>
    <line x1="535" y1="128" x2="491" y2="160" stroke="#4FC3F7" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- Water droplets -->
  <g fill="#00C9FF" opacity="0.7">
    <ellipse cx="492" cy="152" rx="3" ry="4" transform="rotate(-20,492,152)"/>
    <ellipse cx="478" cy="138" rx="2" ry="3" transform="rotate(-15,478,138)"/>
    <ellipse cx="483" cy="165" rx="2" ry="3" transform="rotate(-25,483,165)"/>
  </g>

  <!-- Bubbles -->
  <g opacity="0.55">
    <circle cx="175" cy="108" r="22" fill="none" stroke="#4FC3F7" stroke-width="1.5"/>
    <circle cx="155" cy="130" r="16" fill="none" stroke="#00C9FF" stroke-width="1.2"/>
    <circle cx="195" cy="138" r="12" fill="none" stroke="#4FC3F7" stroke-width="1.0"/>
    <circle cx="170" cy="148" r="8" fill="none" stroke="#B3E5FC" stroke-width="0.8"/>
    <circle cx="195" cy="110" r="9" fill="none" stroke="#00C9FF" stroke-width="0.8"/>
    <circle cx="145" cy="115" r="6" fill="none" stroke="#4FC3F7" stroke-width="0.7"/>
    <circle cx="170" cy="102" r="4" fill="#B3E5FC" opacity="0.3"/>
    <circle cx="150" cy="124" r="3" fill="#B3E5FC" opacity="0.3"/>
  </g>

  <!-- BRAND NAME : CARWASH -->
  <text x="340" y="318" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" letter-spacing="8" fill="#FFFFFF">CAR<tspan fill="#00C9FF">WASH</tspan></text>

  <!-- Tagline -->
  <text x="340" y="345" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif" font-size="11.5" font-weight="400" letter-spacing="4" fill="#4FC3F7" opacity="0.85">GESTION DE CENTRE DE LAVAGE</text>

  <!-- Separator with drop -->
  <line x1="255" y1="326" x2="308" y2="326" stroke="#00C9FF" stroke-width="0.5" opacity="0.4"/>
  <line x1="372" y1="326" x2="425" y2="326" stroke="#00C9FF" stroke-width="0.5" opacity="0.4"/>
  <path d="M340,320 Q337,313 340,307 Q343,313 340,320 Z" fill="#00C9FF" opacity="0.9"/>

  <!-- Badge -->
  <rect x="290" y="360" width="100" height="22" rx="11" fill="#0D3B5E" stroke="#1A8CC7" stroke-width="0.8"/>
  <text x="340" y="375" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif" font-size="10" font-weight="500" letter-spacing="2" fill="#4FC3F7">PRO MANAGER</text>
</svg>
